name: Release (Windows)

# Baut die Windows-Desktop-App, sobald ein Versions-Tag (vX.Y.Z) gepusht wird,
# und legt sie als Entwurfs-Release mit .msi/.exe ab. Auch manuell startbar.
#
# macOS wird bewusst NICHT in der CI gebaut: Die App wird dort lokal mit der
# Developer-ID signiert + notarisiert (npm run tauri build). Für signierte
# macOS-CI-Builds müssten die Apple-Secrets (Zertifikat + Notarisierung) als
# GitHub-Secrets hinterlegt und ein eigener macOS-Job ergänzt werden.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Frontend-Abhängigkeiten installieren
        working-directory: app
        run: npm ci

      - name: Bauen & Release-Entwurf erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "TriggerMap ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
